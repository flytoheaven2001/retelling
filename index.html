<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4-Panel Manga Speech Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; background-color: #f0f4f8; }
        .manga-img { width: 100%; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #transcript { min-height: 200px; line-height: 1.6; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-3">Target Story</h2>
            <img src="http://googleusercontent.com/image_generation_content/0" alt="Coffee Life Manga" class="manga-img">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-1 space-y-4">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 text-center">
                    <div class="text-4xl font-bold text-blue-600 mb-1" id="timer">00:00</div>
                    <p class="text-xs text-slate-400 font-medium uppercase">Elapsed Time</p>
                </div>

                <button id="record-btn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-xl transition shadow-lg flex items-center justify-center gap-2">
                    <span id="record-icon" class="w-3 h-3 bg-white rounded-full"></span>
                    <span id="record-text">Start Recording</span>
                </button>

                <button id="reset-btn" class="w-full bg-slate-200 hover:bg-slate-300 text-slate-600 font-bold py-3 rounded-xl transition">
                    Reset
                </button>
            </div>

            <div class="md:col-span-2">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-full flex flex-col">
                    <h3 class="text-sm font-bold text-slate-400 uppercase mb-3">Transcript</h3>
                    <div id="transcript" class="flex-grow bg-slate-50 p-4 rounded-xl text-slate-700 overflow-y-auto italic">
                        Click 'Start' and describe the manga...
                    </div>
                    <div id="word-count" class="mt-3 text-right text-sm font-semibold text-blue-500">0 words</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let recognition;
        let startTime;
        let timerInterval;
        let isRecording = false;

        const recordBtn = document.getElementById('record-btn');
        const resetBtn = document.getElementById('reset-btn');
        const timerDisplay = document.getElementById('timer');
        const transcriptDisplay = document.getElementById('transcript');
        const wordCountDisplay = document.getElementById('word-count');
        const recordText = document.getElementById('record-text');
        const recordIcon = document.getElementById('record-icon');

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            recognition.onresult = (event) => {
                let finalTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
                }
                if (finalTranscript) {
                    transcriptDisplay.textContent = finalTranscript;
                    updateWordCount(finalTranscript);
                }
            };
        }

        function updateTimer() {
            const now = new Date();
            const diff = new Date(now - startTime);
            const mins = String(diff.getUTCMinutes()).padStart(2, '0');
            const secs = String(diff.getUTCSeconds()).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        function updateWordCount(text) {
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            wordCountDisplay.textContent = `${words.length} words`;
        }

        recordBtn.addEventListener('click', () => {
            if (!isRecording) {
                // Start
                isRecording = true;
                startTime = new Date();
                timerInterval = setInterval(updateTimer, 1000);
                transcriptDisplay.textContent = "Listening...";
                recordText.textContent = "Stop & Finish";
                recordIcon.classList.add('animate-pulse');
                recordBtn.classList.replace('bg-red-500', 'bg-slate-800');
                recognition.start();
            } else {
                // Stop
                isRecording = false;
                clearInterval(timerInterval);
                recognition.stop();
                recordText.textContent = "Start Recording";
                recordIcon.classList.remove('animate-pulse');
                recordBtn.classList.replace('bg-slate-800', 'bg-red-500');
            }
        });

        resetBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
